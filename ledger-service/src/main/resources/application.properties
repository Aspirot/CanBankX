spring.application.name=ledger-service
server.port=8084

spring.datasource.url=jdbc:h2:mem:ledgerdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/bank-realm}
internal.gateway.header-name=${INTERNAL_GATEWAY_HEADER_NAME:X-Internal-Gateway}
internal.gateway.secret=${INTERNAL_GATEWAY_SECRET:canbankx-gateway-secret}

management.endpoints.web.exposure.include=health,info,prometheus

springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
