spring.application.name=payment-service
server.port=8083

spring.datasource.url=jdbc:h2:mem:paymentdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/bank-realm}

api-gateway.base-url=${API_GATEWAY_URL:http://localhost:8085}
internal-auth.token-url=${INTERNAL_AUTH_TOKEN_URL:http://localhost:8080/realms/bank-realm/protocol/openid-connect/token}
internal-auth.client-id=${INTERNAL_AUTH_CLIENT_ID:payment-service}
internal-auth.client-secret=${INTERNAL_AUTH_CLIENT_SECRET:payment-service-secret}
internal-auth.scope=${INTERNAL_AUTH_SCOPE:internal.service}

internal.gateway.header-name=${INTERNAL_GATEWAY_HEADER_NAME:X-Internal-Gateway}
internal.gateway.secret=${INTERNAL_GATEWAY_SECRET:canbankx-gateway-secret}

spring.mail.host=${MAILHOG_HOST:localhost}
spring.mail.port=${MAILHOG_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
notification.mail.from=${NOTIFICATION_MAIL_FROM:no-reply@canbankx.local}

management.endpoints.web.exposure.include=health,info,prometheus
