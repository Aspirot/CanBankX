global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "account-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["account-service:8081"]

  - job_name: "ledger-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ledger-service:8082"]

  - job_name: "payment-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["payment-service:8083"]

  - job_name: "client-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["client-service:8084"]

  - job_name: "api-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["api-gateway:8085"]