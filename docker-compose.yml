version: "3.8"

services:

  # ----------------------------
  # PostgreSQL (pour Keycloak)
  # ----------------------------
  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - backend

  # ----------------------------
  # Keycloak
  # ----------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./docs/keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - backend

  # ----------------------------
  # Prometheus
  # ----------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - backend

  # ----------------------------
  # Grafana
  # ----------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - backend

  # ----------------------------
  # API Gateway
  # ----------------------------
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/bank-realm
      CLIENT_SERVICE_URL: http://client-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      LEDGER_SERVICE_URL: http://ledger-service:8084
      INTERNAL_GATEWAY_HEADER_NAME: X-Internal-Gateway
      INTERNAL_GATEWAY_SECRET: canbankx-gateway-secret
    ports:
      - "8085:8085"
    depends_on:
      - keycloak
    networks:
      - backend

# ----------------------------
# Volumes
# ----------------------------
volumes:
  keycloak-db-data:

# ----------------------------
# Network
# ----------------------------
networks:
  backend:
    name: canbankx-network
    driver: bridge
